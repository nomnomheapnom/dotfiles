# Variables
$activeBorderColor = rgba(FF6B4Aff) rgba(7B534Eff) 45deg
$inactiveBorderColor = rgba(595959aa)

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1

    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    
    shadow {
        enabled = false
    }
    
    blur {
        enabled = false
    }
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0
        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)
        gradients = false
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

animations {
    # This is the master switch to disable all animations
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    background_color = 0x000000
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    vfr = true # Changed to true; usually better for performance/battery
}

render {
    direct_scanout = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}