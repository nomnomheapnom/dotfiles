$activeBorderColor = rgba(FF6B4Aff) rgba(7B534Eff) 45deg
$inactiveBorderColor = rgba(595959aa)

#general {
#    gaps_in = 0
#    gaps_out = 0
#    border_size = 1
#    col.active_border = $activeBorderColor
#    col.inactive_border = $inactiveBorderColor
#    resize_on_border = false
#    allow_tearing = false
#    layout = dwindle
#}

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1

    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal
        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0
        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)
        gradients = false
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = false

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCircle, 0.85, 0, 0.15, 1
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcceel, 0.5, 0, 0.5, 1
    bezier = outBack, 0.34, 1.56, 0.64, 1

    animation = windows, 1, 2, md3_decel, popin 60%
    animation = windowsIn, 1, 2, md3_decel, popin 60%
    animation = windowsOut, 1, 2, md3_accel, popin 60%
    animation = border, 1, 5, default
    animation = fade, 1, 2, md3_decel
    animation = layers, 1, 1, md3_decel, slide
    animation = workspaces, 1, 3, md3_decel, slide
    animation = specialWorkspace, 1, 2, md3_decel, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    background_color = 0x000000
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    vfr = false
}

render {
    direct_scanout = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}
