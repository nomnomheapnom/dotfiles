$bg_color = rgba(12, 12, 12, 1.0)
$text_main = rgba(217, 175, 167, 1.0)
$text_muted = rgba(217, 175, 167, 0.4)
$accent = rgba(255, 107, 74, 1.0)

general {
    ignore_empty_input = true
    hide_cursor = true
    disable_loading_bar = true
    grace = 0
}

background {
    monitor =
    color = $bg_color
    path = /home/nomnomheapnom/.config/hypr/mars-1.png
    blur_passes = 2
    blur_size = 7
    noise = 0.0150
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fade, 1, 1.5, linear
}

# --- LEFT SIDE: THE ANCHOR ---

# Structural Grid Line
shape {
    monitor =
    size = 4, 1200
    color = $accent
    rounding = 0
    position = 80, 0
    halign = left
    valign = center
    shadow_passes = 0
}

# Split Clock: Hours (Massive, Bold)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H")</span>"
    color = $text_main
    font_size = 170
    font_family = JetBrainsMono Nerd Font Bold
    position = 120, -100
    halign = left
    valign = top
    shadow_passes = 0
}

# Split Clock: Minutes (Massive, Light)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = $text_muted
    font_size = 170
    font_family = JetBrainsMono Nerd Font Light
    position = 120, -320
    halign = left
    valign = top
    shadow_passes = 0
}

# Date 
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%A, %d %B")</span>"
    color = $text_main
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 135, -590
    halign = left
    valign = top
    shadow_passes = 0
}

# --- RIGHT SIDE: INTERACTIVE / DETAIL ---

# User Label
label {
    monitor =
    text = <span text_transform="lowercase" letter_spacing="100">@nnhn</span>
    color = $text_main
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = -100, 240
    halign = right
    valign = bottom
    shadow_passes = 0
}

# Yiddish Quote
label {
    monitor =
    text = Invisible threads are the strongest ties
    color = $text_main
    font_size = 18 
    font_family = JetBrainsMono Nerd Font Thin
    position = -100, 190
    halign = right
    valign = bottom
    shadow_passes = 0
}

input-field {
    monitor =
    size = 350, 45
    position = -100, 100
    halign = right
    valign = bottom
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = $accent         
    outline_thickness = 2         
    font_family = JetBrainsMono Nerd Font
    font_color = $text_main
    placeholder_text = 
    check_color = $text_main      
    fail_text = <i>[$ATTEMPTS]</i>
    fail_color = $accent
    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

# Sub-line under input to ground it
shape {
    monitor =
    size = 350, 1
    color = $text_muted
    rounding = 0
    position = -100, 80
    halign = right
    valign = bottom
    shadow_passes = 0
}

auth {
    fingerprint:enabled = false
}
