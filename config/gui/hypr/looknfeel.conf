$activeBorderColor = rgba(FF6B4Aff) rgba(7B534Eff) 45deg
# Simplified to a single solid hex for the inactive border to ensure compatibility
$inactiveBorderColor = rgba(595959aa)

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    
    # Removed col.background from here (invalid field)
    
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    # This is the correct way to set the background color to #000000
    background_color = rgb(000000)
    
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}
