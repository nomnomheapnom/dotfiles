# Mars-themed Starship prompt
# Palette inspired by mars.nvim: deep reds, rust, dusty rose, dark space

add_newline = true
command_timeout = 500

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$lua\
$cmd_duration\
$line_break\
$character"""

palette = "mars"

[palettes.mars]
red     = "#D04B35"
rust    = "#E07B5F"
rose    = "#D9AFA7"
crater  = "#7B534E"
dust    = "#C4876C"
ash     = "#B09090"
dark    = "#1A0D0D"
space   = "#8B5E52"

[os]
format  = "[$symbol ]($style)"
style   = "bold red"
disabled = false

[os.symbols]
Linux   = ""
Arch    = "󰣇"
Ubuntu  = ""
Debian  = ""
Fedora  = "󰣛"

[username]
format       = "[$user]($style)[@](crater)"
style_user   = "bold rose"
style_root   = "bold red"
show_always  = false

[hostname]
format    = "[$hostname]($style) "
style     = "italic space"
ssh_only  = true

[directory]
format            = "[ $path]($style)[$read_only]($read_only_style) "
style             = "bold rust"
read_only         = " 󰌾"
read_only_style   = "red"
truncation_length = 3
truncation_symbol = "…/"
repo_root_style   = "bold rose"
repo_root_format  = "[ $repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[  $branch]($style) "
style  = "bold dust"

[git_status]
format      = '([$all_status$ahead_behind]($style) )'
style       = "crater"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date  = "✓"
untracked   = "?${count}"
modified    = "!${count}"
staged      = "+${count}"
renamed     = "»${count}"
deleted     = "✘${count}"
stashed     = "≡"
conflicted  = "~${count}"

[git_state]
format       = '\([$state $progress_current/$progress_total]($style)\) '
style        = "bold red"

[python]
format = '[ ${version}( \($virtualenv\))]($style) '
style  = "bold rust"
symbol = " "

[nodejs]
format = "[ $version]($style) "
style  = "bold rose"

[rust]
format = "[ $version]($style) "
style  = "bold red"

[golang]
format = "[ $version]($style) "
style  = "bold dust"

[lua]
format = "[ $version]($style) "
style  = "bold ash"

[cmd_duration]
format    = "[󱎫 $duration]($style) "
style     = "italic crater"
min_time  = 2_000

[character]
success_symbol = "[❯](bold red)"
error_symbol   = "[✗](bold #FF3300)"
vimcmd_symbol  = "[❮](bold dust)"
